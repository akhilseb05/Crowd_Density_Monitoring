<!DOCTYPE html>
<html>
<head>
    <title>GECW Admin Login</title>
    <style>
        /* Minimal styling to center the form on the screen */
        body { 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            padding-top: 50px; 
        }
        .login-container { 
            border: 1px solid #ccc; 
            padding: 20px; 
            border-radius: 5px; 
            width: 300px; }
        .form-group { 
            margin-bottom: 15px; 
        }
        input { 
            width: 100%; 
            padding: 8px; 
            box-sizing: 
            border-box; 
        }
        button { 
            width: 100%; 
            padding: 10px; 
            cursor: pointer; 
            background-color: #2563eb; 
            color: white; 
            border: none; 
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Admin Login</h2>

    {% if messages %}
        {% for message in messages %}
            <p style="color: red;">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Admin Name:</label><br>
            <input type="text" name="name" required>
        </div>

        <div class="form-group">
            <label>Password:</label><br>
            <input type="password" name="password" required>
        </div>

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
