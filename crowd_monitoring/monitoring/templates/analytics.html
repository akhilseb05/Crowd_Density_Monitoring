{% extends 'base.html' %}

{% block content %}
<style>

    :root {
        --primary-blue: #2563eb;
        --light-blue: #eff6ff;
        --dark-blue: #1e40af;
        --success-green: #10b981;
        --danger-red: #ef4444;
        --bg-white: #ffffff;
        --bg-gray: #f9fafb;
        --border-gray: #e5e7eb;
        --text-dark: #111827;
        --text-light: #6b7280;
    }

    /* You can move this to your main CSS file later */
    .dashboard-container {
        display: flex;
        min-height: 100vh;
        background-color: white; /* Light background for contrast */
    }

    .sidebar {
        width: 150px;
        background: var(--bg-white);
        border-right: 1px solid var(--border-gray);
        display: flex;
        flex-direction: column;
        padding-top: 25px;
        position: sticky;
        top: 0;
        height: 100vh;
        margin-right:10px;
    }

    .back-btn {
        text-decoration: none;
        color: var(--text-light);
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 20px;
        margin-left: 5px;
        text-transform: uppercase;
        padding-left: 15px;
    }

    .nav-list {
        list-style: none;
        padding: 0;
        width: 100%;
    }

    .nav-item {
        margin-bottom: 20px;
    }

    .nav-item a {
        text-decoration: none;
        color: var(--text-light);
        font-size: 15px;
        display: block;
        padding: 10px 5px 10px 20px;
        transition: 0.2s;
    }

    .nav-item.active {
        background: var(--light-blue);
        border-right: 3px solid var(--primary-blue);
    }

    .nav-item.active a {
        color: var(--primary-blue);
        font-weight: 700;
    }


    .main-content {
        flex-grow: 1; /* Takes up the remaining space */
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="dashboard-container">

    <div class="sidebar">
        <a href="{% url 'event_list' %}" class="back-btn">← BACK</a>
        
        <ul class="nav-list">
            <li class="nav-item">
                <a href="{% url 'dashboard' event.id %}">1. Dashboard</a>
            </li>
            <li class="nav-item">
                <a href="{% url 'send_alerts' event.id %}">2. Alerts</a>
            </li>
            <li class="nav-item active">
                <a href="#">3. Analytics</a>
            </li>
            <li class="nav-item">
                <a href="#">4. Invite & Share</a>
            </li>
        </ul>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 style="font-weight: 700; color: #333;padding-top: 20px; margin-left: 15px;">Analytics: {{ event.event_name }}</h2>
            
            <div class="d-flex gap-3">
                <select id="chartViewToggle" class="form-select w-auto" onchange="updateChart()">
                    <option value="total">Total Event Crowd</option>
                    <option value="zones">Crowd by Zones</option>
                </select>
                <a href="{% url 'export_event_analytics_csv' event.id %}" class="btn btn-outline-secondary d-flex align-items-center gap-2" style = "margin-right: 15px;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-save" viewBox="0 0 16 16">
                    <path d="M2 1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H9.5a1 1 0 0 0-1 1v7.293l2.646-2.647a.5.5 0 0 1 .708.708l-3.5 3.5a.5.5 0 0 1-.708 0l-3.5-3.5a.5.5 0 1 1 .708-.708L7.5 9.293V2a2 2 0 0 1 2-2H14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h2.5a.5.5 0 0 1 0 1H2z"/>
                    </svg>
                    Export as .csv
                </a>
            </div>
        </div>

        <div style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 15px rgba(0,0,0,0.05);">
            <canvas id="crowdChart" height="100"></canvas>
        </div>
    </div>

</div>

<script>
    const timeLabels = JSON.parse('{{ time_labels|safe }}');
    const totalData = JSON.parse('{{ total_data|safe }}');
    const zoneDatasets = JSON.parse('{{ zone_datasets|safe }}');

    const ctx = document.getElementById('crowdChart').getContext('2d');
    let crowdChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: timeLabels,
            datasets: [{
                label: 'Total Crowd Density',
                data: totalData,
                borderColor: '#0000FF', 
                backgroundColor: '#0000FF',
                fill: false,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: true, title: { display: true, text: 'Person Count' } },
                x: { title: { display: true, text: 'Time of Day' } }
            },
            plugins: {
                legend: { position: 'bottom' } 
            }
        }
    });

    function updateChart() {
        const viewType = document.getElementById('chartViewToggle').value;
        
        if (viewType === 'total') {
            crowdChart.data.datasets = [{
                label: 'Total Crowd Density',
                data: totalData,
                borderColor: '#0000FF',
                backgroundColor: '#0000FF',
                fill: false,
                tension: 0.3
            }];
        } else if (viewType === 'zones') {
            crowdChart.data.datasets = zoneDatasets;
        }
        
        crowdChart.update(); 
    }
</script>
{% endblock %}
