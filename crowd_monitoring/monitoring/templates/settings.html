{% extends 'base.html' %} {% block content %}
<style>
    /* Wrapper to hold sidebar and main panel side-by-side */
    .dashboard-wrapper {
        display: flex;
        background-color: #f8fafc;
        min-height: 100vh;
        font-family: 'Inter', sans-serif;
    }

    /* Sidebar CSS */
    .sidebar { 
        flex: 0 0 250px;
        background: #ffffff; 
        border-right: 2px solid #dee2e6; 
        border-radius: 8px; 
        padding-top: 1.5rem; 
        min-height: 95vh;
        margin-right: 20px; 
        padding-bottom: 1.5rem; 
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }
    
    .custom-nav-link.active { 
        background-color: #eef2ff !important; 
        color: #0d6efd !important; 
        font-weight: 600; 
        border-radius: 0.5rem; 
    }
    .custom-nav-link { 
        color: #6c757d; 
        padding: 0.75rem 1.5rem; 
        margin: 0 1rem 0.5rem 1rem; 
        text-decoration: none;
        display: block;
        transition: background-color 0.2s;
    }
    .custom-nav-link:hover {
        background-color: #f8f9fa;
    } 

    .main-panel { 
        flex: 1; 
        min-width: 0; 
    }

    .settings-card {
        background: #ffffff;
        padding: 40px;
        margin-top: 10px;
        border-radius: 8px;
        border: 1px solid #dee2e6;
        max-width: 500px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    .settings-card h2 {
        margin-top: 0;
        margin-bottom: 25px;
        color: #1e293b;
        font-size: 24px;
        border-bottom: 2px solid #f1f5f9;
        padding-bottom: 10px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
        color: #475569;
        font-size: 14px;
    }

    .form-control {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        font-size: 15px;
        box-sizing: border-box;
    }

    .form-control:focus {
        outline: none;
        border-color: #0d6efd;
        box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.1);
    }

    .submit-btn {
        width: 100%;
        padding: 12px;
        background-color: #0d6efd;
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        font-size: 16px;
        margin-top: 10px;
        transition: 0.2s;
    }

    .submit-btn:hover {
        background-color: #0b5ed7;
    }

    .alert {
        padding: 12px;
        border-radius: 6px;
        margin-bottom: 20px;
        font-weight: 500;
        font-size: 14px;
    }
    .alert-error { background-color: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .alert-success { background-color: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
</style>

<div class="dashboard-wrapper">
    <div class="sidebar">
        <nav class="nav flex-column">
            <a class="custom-nav-link" href="{% url 'event_list' %}">Home & Events</a>
            <a class="custom-nav-link active" href="{% url 'settings_view' %}">Settings</a>
        </nav>
    </div>

    <div class="main-panel">
        <div class="settings-card">
            <h2>CREATE ADMIN</h2>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                
                <div class="form-group">
                    <label>New Admin Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                </div>

                <div class="form-group">
                    <label>Contact Number</label>
                    <input type="tel" name="contact_no" class="form-control" placeholder="e.g. +91 9876543210" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="submit-btn">Create Admin User</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
